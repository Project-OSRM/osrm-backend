<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title></title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
    </style>
    <style type='text/css'>
        #info {
            display: block;
            position: relative;
            margin: 0px auto;
            width: 50%;
            padding: 10px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            text-align: center;
            color: #222;
            background: #fff;
        }
    </style>
</head>

<body>

    <div id='map'></div>
    <div id="info"></div>
    <script>
        var map = new maplibregl.Map({
            container: 'map',
            style: 'https://pnorman.github.io/tilekiln-shortbread-demo/colorful.json',
            center: [8.682127, 50.110924],
            zoom: 13
        });


        map.on('mousemove', function (e) {
            document.getElementById('info').innerHTML =
                // e.point is the x, y coordinates of the mousemove event relative
                // to the top-left corner of the map
                JSON.stringify(e.point) + '<br />' +
                // e.lngLat is the longitude, latitude geographical position of the event
                JSON.stringify(e.lngLat);
        });

        map.on('click', function (e) {
            console.log(JSON.stringify(e.lngLat));
            var xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function () {
                if (this.readyState == 4 && this.status == 200) {
                    var j = JSON.parse(this.responseText);

                    // Update existing source data if present, otherwise add source+layer.
                    if (map.getSource("isochrone")) {
                        try {
                            map.getSource("isochrone").setData(j);
                        } catch (e) {
                            // Fallback: remove source/layer and re-add
                            if (map.getLayer("isochrone-points")) map.removeLayer("isochrone-points");
                            map.removeSource("isochrone");
                            map.addSource("isochrone", {
                                "type": "geojson",
                                "data": j
                            });
                        }
                    } else {
                        map.addSource("isochrone", {
                            "type": "geojson",
                            "data": j
                        });
                    }

                    // Ensure old heatmap/point layers are removed before adding new to avoid duplicates
                    if (map.getLayer("isochrone-heat")) {
                        map.removeLayer("isochrone-heat");
                    }
                    if (map.getLayer("isochrone-points")) {
                        map.removeLayer("isochrone-points");
                    }

                    // Add heatmap layer for a smooth density visualization
                    map.addLayer({
                        "id": "isochrone-heat",
                        "type": "heatmap",
                        "source": "isochrone",
                        "maxzoom": 15,
                        "paint": {
                            // Weight points by the 'weight' property (convert deciseconds -> seconds)
                            "heatmap-weight": ["interpolate", ["linear"], ["/", ["get", "weight"], 10], 0, 0, 900, 1],
                            "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 0, 1, 15, 3],
                            "heatmap-color": [
                                "interpolate", ["linear"], ["heatmap-density"],
                                0, "rgba(33,102,172,0)",
                                0.2, "rgb(103,169,207)",
                                0.4, "rgb(209,229,240)",
                                0.6, "rgb(253,219,199)",
                                0.8, "rgb(239,138,98)",
                                1, "rgb(178,24,43)"
                            ],
                            "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 0, 2, 15, 20],
                            "heatmap-opacity": ["interpolate", ["linear"], ["zoom"], 7, 1, 15, 0]
                        }
                    });

                    // Add a small circle layer at high zoom to show individual points
                    map.addLayer({
                        "id": "isochrone-points",
                        "type": "circle",
                        "source": "isochrone",
                        "minzoom": 14,
                        "paint": {
                            "circle-radius": 3,
                            "circle-color": [
                                "interpolate", ["linear"], ["/", ["get", "weight"], 10],
                                0, "blue",
                                300, "red",
                                600, "yellow",
                                900, "green"
                            ],
                            "circle-stroke-color": "#ffffff",
                            "circle-stroke-width": 1,
                            "circle-opacity": ["interpolate", ["linear"], ["zoom"], 14, 0, 15, 1]
                        }
                    });
                }
            };
            xhttp.open("GET", "http://localhost:5000/isochrone/v1/driving/" + e.lngLat.lng + "," + e.lngLat.lat, true);
            xhttp.send();
        });
    </script>

</body>

</html>
