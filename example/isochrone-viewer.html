<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title></title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        #controls {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 2;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 4px;
            padding: 10px 12px;
            font-family: sans-serif;
            font-size: 13px;
        }

        #range-value {
            font-weight: bold;
        }
    </style>
    <style type='text/css'>
        #info {
            display: block;
            position: relative;
            margin: 0px auto;
            width: 50%;
            padding: 10px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            text-align: center;
            color: #222;
            background: #fff;
        }
    </style>
</head>

<body>

    <div id='map'></div>
    <div id="controls">
        <label for="range-slider">Range (seconds): <span id="range-value">900</span></label><br />
        <input id="range-slider" type="range" min="60" max="1800" step="30" value="900" />
    </div>
    <div id="info"></div>
    <script>
        var currentController = null;
        var lastClickedLngLat = null;
        var slider = document.getElementById('range-slider');
        var rangeValue = document.getElementById('range-value');

        function updateRangeLabel() {
            rangeValue.textContent = slider.value;
        }

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));
        }

        function normalizeIsochroneData(data, maxWeight) {
            var features = (data && data.features) ? data.features : [];
            return {
                type: "FeatureCollection",
                max_range: data.max_range,
                features: features.map(function (feature) {
                    var weight = Number(feature.properties && feature.properties.weight);
                    if (!Number.isFinite(weight)) {
                        weight = 0;
                    }
                    var ratio = clamp01(weight / maxWeight);
                    return {
                        type: feature.type,
                        geometry: feature.geometry,
                        properties: Object.assign({}, feature.properties, {
                            weight: weight,
                            weight_ratio: ratio
                        })
                    };
                })
            };
        }

        function buildConnectionData(features) {
            var points = [];
            for (var i = 0; i < features.length; i++) {
                var feature = features[i];
                if (!feature.geometry || feature.geometry.type !== "Point") {
                    continue;
                }
                var coord = feature.geometry.coordinates;
                if (!coord || coord.length < 2) {
                    continue;
                }
                points.push({
                    coordinates: [coord[0], coord[1]],
                    ratio: Number(feature.properties.weight_ratio) || 0
                });
            }

            if (points.length < 2) {
                return { type: "FeatureCollection", features: [] };
            }

            if (points.length > 4000) {
                var stride = Math.ceil(points.length / 4000);
                points = points.filter(function (_point, idx) { return idx % stride === 0; });
            }

            var lines = [];
            for (var idx = 1; idx < points.length; idx++) {
                var current = points[idx];
                var nearestIndex = 0;
                var nearestDistance = Infinity;

                for (var jdx = 0; jdx < idx; jdx++) {
                    var candidate = points[jdx];
                    var dx = current.coordinates[0] - candidate.coordinates[0];
                    var dy = current.coordinates[1] - candidate.coordinates[1];
                    var distSq = dx * dx + dy * dy;
                    if (distSq < nearestDistance) {
                        nearestDistance = distSq;
                        nearestIndex = jdx;
                    }
                }

                var nearest = points[nearestIndex];
                lines.push({
                    type: "Feature",
                    geometry: {
                        type: "LineString",
                        coordinates: [nearest.coordinates, current.coordinates]
                    },
                    properties: {
                        weight_ratio: (nearest.ratio + current.ratio) / 2
                    }
                });
            }

            return {
                type: "FeatureCollection",
                features: lines
            };
        }

        function renderIsochrone(j) {
            var maxRangeSeconds = Number(j.max_range);
            if (!Number.isFinite(maxRangeSeconds) || maxRangeSeconds <= 0) {
                maxRangeSeconds = Number(slider.value);
            }
            var maxWeight = Math.max(1, maxRangeSeconds * 10);
            var normalizedData = normalizeIsochroneData(j, maxWeight);
            var connectionData = buildConnectionData(normalizedData.features);

            if (map.getSource("isochrone")) {
                map.getSource("isochrone").setData(normalizedData);
            } else {
                map.addSource("isochrone", {
                    "type": "geojson",
                    "data": normalizedData
                });
            }

            if (map.getSource("isochrone-connections")) {
                map.getSource("isochrone-connections").setData(connectionData);
            } else {
                map.addSource("isochrone-connections", {
                    "type": "geojson",
                    "data": connectionData
                });
            }

            if (!map.getLayer("isochrone-heat")) {
                map.addLayer({
                    "id": "isochrone-heat",
                    "type": "heatmap",
                    "source": "isochrone",
                    "maxzoom": 15,
                    "paint": {
                        "heatmap-weight": ["get", "weight_ratio"],
                        "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 0, 1, 15, 3],
                        "heatmap-color": [
                            "interpolate", ["linear"], ["heatmap-density"],
                            0, "rgba(33,102,172,0)",
                            0.2, "rgb(103,169,207)",
                            0.4, "rgb(209,229,240)",
                            0.6, "rgb(253,219,199)",
                            0.8, "rgb(239,138,98)",
                            1, "rgb(178,24,43)"
                        ],
                        "heatmap-radius": ["interpolate", ["linear"], ["zoom"], 0, 2, 15, 20],
                        "heatmap-opacity": ["interpolate", ["linear"], ["zoom"], 7, 1, 15, 0]
                    }
                });
            }

            if (!map.getLayer("isochrone-links")) {
                map.addLayer({
                    "id": "isochrone-links",
                    "type": "line",
                    "source": "isochrone-connections",
                    "paint": {
                        "line-width": ["interpolate", ["linear"], ["zoom"], 11, 0.4, 15, 2.0],
                        "line-opacity": 0.55,
                        "line-color": [
                            "interpolate", ["linear"], ["get", "weight_ratio"],
                            0.0, "#313695",
                            0.2, "#4575b4",
                            0.4, "#74add1",
                            0.6, "#fdae61",
                            0.8, "#f46d43",
                            1.0, "#a50026"
                        ]
                    }
                });
            }

            if (!map.getLayer("isochrone-points")) {
                map.addLayer({
                    "id": "isochrone-points",
                    "type": "circle",
                    "source": "isochrone",
                    "minzoom": 14,
                    "paint": {
                        "circle-radius": 3,
                        "circle-color": [
                            "interpolate", ["linear"], ["get", "weight_ratio"],
                            0.0, "#313695",
                            0.2, "#4575b4",
                            0.4, "#74add1",
                            0.6, "#fdae61",
                            0.8, "#f46d43",
                            1.0, "#a50026"
                        ],
                        "circle-stroke-color": "#ffffff",
                        "circle-stroke-width": 0.5,
                        "circle-opacity": ["interpolate", ["linear"], ["zoom"], 14, 0, 15, 1]
                    }
                });
            }

            map.setPaintProperty("isochrone-points", "circle-color", [
                "interpolate", ["linear"], ["get", "weight_ratio"],
                0.0, "#313695",
                0.2, "#4575b4",
                0.4, "#74add1",
                0.6, "#fdae61",
                0.8, "#f46d43",
                1.0, "#a50026"
            ]);
            map.setPaintProperty("isochrone-links", "line-color", [
                "interpolate", ["linear"], ["get", "weight_ratio"],
                0.0, "#313695",
                0.2, "#4575b4",
                0.4, "#74add1",
                0.6, "#fdae61",
                0.8, "#f46d43",
                1.0, "#a50026"
            ]);
        }

        function requestIsochrone(lngLat) {
            if (currentController) {
                currentController.abort();
            }
            currentController = new AbortController();
            var range = slider.value;
            updateRangeLabel();

            var url = "http://localhost:5000/isochrone/v1/driving/" +
                lngLat.lng + "," + lngLat.lat + "?range=" + encodeURIComponent(range);

            fetch(url, { signal: currentController.signal })
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("HTTP " + response.status);
                    }
                    return response.json();
                })
                .then(function (json) {
                    renderIsochrone(json);
                })
                .catch(function (error) {
                    if (error.name !== "AbortError") {
                        console.error(error);
                    }
                });
        }

        updateRangeLabel();

        var map = new maplibregl.Map({
            container: 'map',
            style: 'https://pnorman.github.io/tilekiln-shortbread-demo/colorful.json',
            center: [8.682127, 50.110924],
            zoom: 13
        });


        map.on('mousemove', function (e) {
            var formattedLngLat = {
                lng: e.lngLat.lng.toFixed(7),
                lat: e.lngLat.lat.toFixed(7)
            };
            document.getElementById('info').innerHTML =
                // e.point is the x, y coordinates of the mousemove event relative
                // to the top-left corner of the map
                JSON.stringify(e.point) + '<br />' +
                // e.lngLat is the longitude, latitude geographical position of the event
                JSON.stringify(formattedLngLat);
        });

        map.on('click', function (e) {
            console.log(JSON.stringify(e.lngLat));
            lastClickedLngLat = e.lngLat;
            requestIsochrone(lastClickedLngLat);
        });

        slider.addEventListener('input', function () {
            updateRangeLabel();
            if (lastClickedLngLat) {
                requestIsochrone(lastClickedLngLat);
            }
        });
    </script>

</body>

</html>
