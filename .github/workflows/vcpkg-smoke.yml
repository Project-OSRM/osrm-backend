name: vcpkg-smoke

# Fast manifest-resolution check across every supported OS. Runs `vcpkg
# install` against vcpkg.json to catch baseline/port drift before the full
# osrm-backend.yml matrix spends compute on it. Non-gating: failures here
# don't block merges.

on:
  push:
    branches: [master]
    paths:
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - 'vcpkg-overlay-ports/**'
      - 'CMakePresets.json'
      - '.github/workflows/vcpkg-smoke.yml'
      - '.github/workflows/osrm-backend.yml'
  pull_request:
    paths:
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - 'vcpkg-overlay-ports/**'
      - 'CMakePresets.json'
      - '.github/workflows/vcpkg-smoke.yml'
      - '.github/workflows/osrm-backend.yml'
  workflow_dispatch:

concurrency:
  group: vcpkg-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with vcpkg-configuration.json baseline.
  VCPKG_COMMIT_ID: d015e31e90838a4c9dfa3eed45979bc70d9357fc
  # Use a local filesystem directory as vcpkg's binary cache. The directory
  # itself is persisted across CI runs via actions/cache@v5. The x-gha
  # backend was removed upstream; files+actions/cache is the replacement.
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite"

jobs:
  manifest-resolve:
    # Non-blocking during the migration. Validates only that vcpkg.json +
    # vcpkg-configuration.json resolve and install cleanly on every supported
    # OS. Full cmake build against vcpkg deps happens once rollout step 3
    # rewrites CMakeLists.txt.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-26.04,    triplet: x64-linux }
          - { os: macos-26,        triplet: arm64-osx }
          - { os: macos-26-intel,  triplet: x64-osx }
          - { os: windows-2025,    triplet: x64-windows-static-md }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Configure DNS servers
        if: runner.os == 'Linux'
        run: |
          sudo rm -f /etc/resolv.conf
          {
            echo "nameserver 1.1.1.1"
            echo "nameserver 8.8.8.8"
          } | sudo tee /etc/resolv.conf > /dev/null
      - uses: actions/checkout@v7
      - name: Move temp directory to D drive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path 'D:\Temp' -Force | Out-Null
          'TMP=D:\Temp' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          'TEMP=D:\Temp' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Enable vcpkg binary cache
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.vcpkg-bincache
          key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.triplet }}-${{ env.VCPKG_COMMIT_ID }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ matrix.triplet }}-${{ env.VCPKG_COMMIT_ID }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Pinned to vcpkg-configuration.json baseline.
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          runVcpkgInstall: true
          # Pin to top-level manifest; the default glob **/vcpkg.json would
          # otherwise pick up overlay port manifests in vcpkg-overlay-ports/.
          vcpkgJsonGlob: 'vcpkg.json'
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
