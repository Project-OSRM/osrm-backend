name: Python Bindings

on:
  push:
    branches:
      - nn-py-bindings
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Debug git + setuptools_scm
      run: |
        echo "=== git --version ==="
        git --version
        echo "=== git describe ==="
        git describe --tags --always --long || echo "describe failed"
        echo "=== git tags (v*) ==="
        git tag --list 'v*' | tail -5
        echo "=== git rev-list --count HEAD ==="
        git rev-list --count HEAD
        echo "=== git config --get safe.directory ==="
        git config --get-all safe.directory || echo "(none)"
        echo "=== git status of repo ownership ==="
        ls -la .git | head -3
        id
        echo "=== setuptools_scm.get_version() ==="
        python -m pip install 'setuptools-scm>=10'
        python -c "from setuptools_scm import get_version; print(get_version())"

    - name: Build sdist
      run: |
        python -m pip install build
        python -m build --sdist
        echo "=== sdist produced ==="
        ls -la dist/

    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  build_wheels:
    name: Build - cp312, ${{ matrix.name }}
    needs: [build_sdist]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
          - name: macOS arm64
            runner: macos-14
          - name: Windows amd64
            runner: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Download sdist
      if: runner.os == 'Linux'
      uses: actions/download-artifact@v4
      with:
        name: sdist
        path: dist

    - name: Locate sdist
      if: runner.os == 'Linux'
      id: sdist
      shell: bash
      run: echo "path=$(ls dist/*.tar.gz | head -n1)" >> "$GITHUB_OUTPUT"

    - name: Restore Conan cache
      id: conan-cache
      if: runner.os == 'Windows'
      uses: actions/cache/restore@v5
      with:
        path: ~/.conan2
        key: v4-conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          v4-conan-${{ runner.os }}-

    - name: Run cibuildwheel
      uses: pypa/cibuildwheel@v3.4.0
      with:
        # for linux build the wheel from the sdist
        package-dir: ${{ runner.os == 'Linux' && steps.sdist.outputs.path || '.' }}
      env:
        CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /tmp/ccache:/ccache"
        CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH=/usr/local/lib64:${LD_LIBRARY_PATH} CCACHE_DIR=/ccache"
        CIBW_CONFIG_SETTINGS_MACOS: "cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"
        CIBW_CONFIG_SETTINGS_WINDOWS: "cmake.define.ENABLE_CONAN=ON"

    - name: Save Conan cache
      uses: actions/cache/save@v5
      if: "!cancelled() && runner.os == 'Windows' && steps.conan-cache.outputs.cache-hit != 'true'"
      with:
        path: ~/.conan2
        key: v4-conan-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.name }}
        path: wheelhouse/*.whl

  publish_test_pypi:
    name: Publish to TestPyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - name: Download wheels
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: wheels-*
        merge-multiple: true

    - name: Download sdist
      uses: actions/download-artifact@v4
      with:
        name: sdist
        path: dist

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@v1.13.0
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true
